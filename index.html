<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #f0f0f0; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #controls { background: #111; border-bottom: 1px solid #222; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
  input[type="text"] { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; padding: 6px 10px; font-size: 13px; width: 260px; }
  button { border: none; border-radius: 6px; padding: 7px 18px; font-size: 13px; cursor: pointer; font-weight: 600; }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #aaaaaa; }
  #status.error { color: #e74c3c; }
  #error-box { display: none; background: #1a0000; border: 1px solid #500; border-radius: 8px; padding: 10px 16px; font-size: 12px; color: #ff6b6b; margin: 6px 20px; font-family: monospace; word-break: break-all; flex-shrink: 0; }
  #display { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 24px 40px; position: relative; overflow: hidden; }
  #placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #2a2a2a; pointer-events: none; }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }
  #translation-box { width: 100%; max-width: 1200px; text-align: center; }
  #translation-lines { display: flex; flex-direction: column; gap: 14px; margin-bottom: 12px; }
  .tline { font-size: clamp(18px, 2.5vw, 36px); line-height: 1.4; text-shadow: 0 2px 20px rgba(0,0,0,0.8); overflow: hidden; transition: color 0.8s, opacity 0.8s; }
  .tline.newest { color: #ffffff; }
  .tline.oldest { color: #555555; }
  #streaming-line { font-size: clamp(18px,2.5vw,36px); line-height: 1.4; color: #aaaaaa; text-shadow: 0 2px 20px rgba(0,0,0,0.8); min-height: 1.4em; transition: opacity 0.3s; }
  #streaming-line.empty { opacity: 0; }
  #streaming-cursor { display: inline-block; width: 3px; height: 0.85em; background: #aaaaaa; vertical-align: text-bottom; margin-left: 3px; animation: blink 0.7s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #interim-text { font-size: clamp(11px,1.2vw,16px); color: #333; margin-top: 12px; font-style: italic; min-height: 1.2em; font-family: sans-serif; }
  #debug-badge { position: fixed; bottom: 24px; left: 20px; font-size: 11px; font-family: monospace; color: #555; background: #111; padding: 4px 8px; border-radius: 4px; border: 1px solid #222; pointer-events: none; }
  #mic-indicator { position: fixed; bottom: 24px; right: 28px; width: 14px; height: 14px; border-radius: 50%; background: #333; }
  #mic-indicator.active { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── REVIEW PAGE ── */
  #review-page { display: none; flex-direction: column; height: 100vh; background: #0a0a0a; }
  #review-header { background: #111; border-bottom: 1px solid #222; padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #review-header h2 { font-size: 16px; font-weight: 600; color: #f0f0f0; flex: 1; }
  #review-header span { font-size: 12px; color: #555; }
  #review-list { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .review-item { background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .review-item.flagged { border-color: #c0392b; background: #1a0a0a; }
  .review-item.saved   { border-color: #27ae60; background: #0a1a0a; }
  .review-english { font-size: 15px; color: #f0f0f0; line-height: 1.5; }
  .btn-flag { background: #c0392b; color: #fff; font-size: 12px; padding: 5px 12px; white-space: nowrap; }
  .correction-area { display: none; flex-direction: column; gap: 8px; }
  .correction-area.open { display: flex; }
  .correction-area label { font-size: 11px; color: #666; font-family: sans-serif; }
  .correction-area textarea { background: #1e1e1e; border: 1px solid #444; border-radius: 6px; color: #f0f0f0; padding: 8px 10px; font-size: 13px; font-family: 'Georgia', serif; resize: vertical; min-height: 60px; }
  .correction-area input[type="text"] { width: 100%; font-size: 13px; }
  .btn-save { background: #27ae60; color: #fff; font-size: 12px; padding: 5px 14px; }
  #review-empty { text-align: center; color: #333; padding: 60px 0; font-size: 15px; }
  #library-section { border-top: 1px solid #1a1a1a; padding: 24px; flex-shrink: 0; }
  #library-section h3 { font-size: 13px; color: #555; margin-bottom: 12px; font-family: sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  #library-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
  .lib-item { background: #111; border: 1px solid #222; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .lib-item-text { flex: 1; }
  .lib-korean  { font-size: 12px; color: #888; font-family: sans-serif; margin-bottom: 3px; }
  .lib-english { font-size: 13px; color: #ccc; }
  .lib-note    { font-size: 11px; color: #555; font-style: italic; margin-top: 3px; font-family: sans-serif; }
  .btn-delete  { background: none; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .btn-delete:hover { color: #e74c3c; }
  #lib-empty { font-size: 13px; color: #333; font-family: sans-serif; }
</style>
</head>
<body>

<!-- ── MAIN PAGE ── -->
<div id="main-page">
  <div id="controls">
    <label style="font-size:13px;color:#888;">Sermon topic:</label>
    <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
    <button id="startBtn" onclick="toggleListening()">▶ Start</button>
    <button id="clearBtn" onclick="clearTranslations()" style="background:#555;color:#ccc;">⌫ Clear</button>
    <span id="status">Ready</span>
    <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
  </div>
  <div id="error-box"></div>
  <div id="display">
    <div id="placeholder"><h1>CHIU YANG CHURCH</h1></div>
    <div id="translation-box">
      <div id="translation-lines"></div>
      <div id="streaming-line" class="empty">
        <span id="streaming-text"></span><span id="streaming-cursor" style="display:none"></span>
      </div>
      <div id="interim-text"></div>
    </div>
  </div>
  <div id="mic-indicator"></div>
  <div id="debug-badge">ready</div>
</div>

<!-- ── REVIEW PAGE ── -->
<div id="review-page">
  <div id="review-header">
    <h2>📋 Post-Sermon Review</h2>
    <span>Flag mistranslations to build the correction library</span>
  </div>
  <div id="review-list"><div id="review-empty">No translations from this session yet.</div></div>
  <div id="library-section">
    <h3>Correction Library</h3>
    <div id="library-list"><div id="lib-empty">No corrections saved yet.</div></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var WORKER_URL        = 'https://live-translation.pauljkim22.workers.dev';
var MODEL             = 'claude-sonnet-4-6';
var SILENCE_MS        = 8000;
var MAX_CHARS         = 500;
var FORCE_COMMIT_MS   = 20000;
var MAX_LINES         = 5;
var SHORT_LINE_CHARS  = 120;
var MAX_RETRIES       = 2;
var REQUEST_TIMEOUT   = 20000;
var PROACTIVE_MS      = 25000;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyCqzFwELPmWwDWrbTILL1L-opT0xlKMOPs",
  authDomain: "live-translation-fd583.firebaseapp.com",
  databaseURL: "https://live-translation-fd583-default-rtdb.firebaseio.com",
  projectId: "live-translation-fd583",
  storageBucket: "live-translation-fd583.firebasestorage.app",
  messagingSenderId: "189364035896",
  appId: "1:189364035896:web:552700e29449859089a1cd"
};
firebase.initializeApp(firebaseConfig);
var db              = firebase.database();
var translationsRef = db.ref('translations');
var libraryRef      = db.ref('correction_library');
var isOperator      = window.location.search.includes('operator');
var isReview        = window.location.search.includes('review');

function $(id) { return document.getElementById(id); }

// ── AUTH ──────────────────────────────────────────────────────────────────────
if (isOperator || isReview) {
  firebase.auth().signInAnonymously().catch(function (err) {
    console.warn('Firebase auth failed:', err.message);
  });
}

// ── REVIEW PAGE ───────────────────────────────────────────────────────────────
if (isReview) {
  $('main-page').style.display   = 'none';
  $('review-page').style.display = 'flex';
  var library = {};

  libraryRef.on('value', function (snap) {
    library = snap.val() || {};
    renderLibrary();
  });

  translationsRef.once('value', function (snap) {
    var items = [];
    snap.forEach(function (child) {
      if (child.val() && child.val().text) items.push({ key: child.key, english: child.val().text });
    });
    if (!items.length) return;
    var el = $('review-list');
    el.innerHTML = '';
    items.forEach(function (item) {
      var div = document.createElement('div');
      div.className = 'review-item';
      div.id = 'ri-' + item.key;
      div.innerHTML =
        '<div class="review-english">' + esc(item.english) + '</div>' +
        '<div><button class="btn-flag" onclick="flagItem(\'' + item.key + '\')">⚑ Flag as mistranslation</button></div>' +
        '<div class="correction-area" id="ca-' + item.key + '">' +
          '<label>ORIGINAL (Korean or English phrase that was wrong)</label>' +
          '<input type="text" id="ko-' + item.key + '" placeholder="e.g. 백종원의 골목식당" />' +
          '<label>CORRECT ENGLISH</label>' +
          '<textarea id="en-' + item.key + '">' + esc(item.english) + '</textarea>' +
          '<label>NOTE (optional)</label>' +
          '<input type="text" id="note-' + item.key + '" placeholder="e.g. pastor uses this phrase often" />' +
          '<button class="btn-save" onclick="saveCorrection(\'' + item.key + '\')">✓ Save to Library</button>' +
        '</div>';
      el.appendChild(div);
    });
  });

  function flagItem(key) {
    var ca = $('ca-' + key), ri = $('ri-' + key);
    ca.classList.toggle('open');
    ri.classList.toggle('flagged', ca.classList.contains('open'));
  }

  function saveCorrection(key) {
    var korean  = $('ko-' + key).value.trim();
    var english = $('en-' + key).value.trim();
    var note    = $('note-' + key).value.trim();
    if (!english) { alert('Please enter the correct English translation.'); return; }
    libraryRef.push({ korean: korean || '', english: english, note: note, savedAt: firebase.database.ServerValue.TIMESTAMP });
    var ri = $('ri-' + key);
    ri.classList.remove('flagged'); ri.classList.add('saved');
    $('ca-' + key).classList.remove('open');
    var btn = ri.querySelector('.btn-flag');
    btn.textContent = '✓ Saved'; btn.disabled = true; btn.style.background = '#27ae60';
  }

  function renderLibrary() {
    var el = $('library-list');
    var entries = Object.entries(library);
    if (!entries.length) { el.innerHTML = '<div id="lib-empty">No corrections saved yet.</div>'; return; }
    el.innerHTML = '';
    entries.slice().reverse().forEach(function (pair) {
      var k = pair[0], v = pair[1];
      var div = document.createElement('div');
      div.className = 'lib-item';
      div.innerHTML =
        '<div class="lib-item-text">' +
          (v.korean ? '<div class="lib-korean">' + esc(v.korean) + '</div>' : '') +
          '<div class="lib-english">' + esc(v.english) + '</div>' +
          (v.note ? '<div class="lib-note">' + esc(v.note) + '</div>' : '') +
        '</div>' +
        '<button class="btn-delete" onclick="deleteLib(\'' + k + '\')" title="Delete">✕</button>';
      el.appendChild(div);
    });
  }

  function deleteLib(key) { if (confirm('Remove this entry?')) libraryRef.child(key).remove(); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
}

// ── VIEWER ────────────────────────────────────────────────────────────────────
if (!isOperator && !isReview) {
  document.addEventListener('DOMContentLoaded', function () {
    $('controls').style.display       = 'none';
    $('error-box').style.display      = 'none';
    $('streaming-line').style.display = 'none';
    $('interim-text').style.display   = 'none';
    $('debug-badge').style.display    = 'none';
    var seenKeys = new Set();
    translationsRef.limitToLast(10).once('value', function (snap) {
      snap.forEach(function (child) {
        seenKeys.add(child.key);
        var it = child.val();
        if (it && it.text) displayFinalLine(it.text, true);
      });
      translationsRef.on('child_added', function (snap) {
        if (seenKeys.has(snap.key)) return;
        seenKeys.add(snap.key);
        var it = snap.val();
        if (it && it.text) displayFinalLine(it.text, true);
      });
    });
    translationsRef.on('value', function (snap) {
      if (!snap.val()) {
        $('translation-lines').innerHTML = '';
        $('placeholder').style.display = 'block';
        seenKeys.clear();
      }
    });
  });
}

// ── OPERATOR STATE ────────────────────────────────────────────────────────────
var rec                  = null;
var recNext              = null;
var isListening          = false;
var silenceTimer         = null;
var forceCommitTimer     = null;
var watchdogTimer        = null;
var proactiveTimer       = null;
var isTranslating        = false;
var translationQueue     = [];
var historyLog           = [];
var autoSermonContext    = '';
var contextUpdateCounter = 0;
var fullTranscript       = '';
var cursor               = 0;
var lastFirebaseKey      = null;
var lastActivityTime     = 0;

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function showError(msg) { $('error-box').style.display = 'block'; $('error-box').textContent = msg; setStatus('Error', 'error'); }
function clearError()   { $('error-box').style.display = 'none'; }
function setStatus(msg, cls) { $('status').textContent = msg; $('status').className = cls || ''; }
function dbg(msg) { var el = $('debug-badge'); if (el) el.textContent = msg; }

function toggleFullscreen() {
  if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); $('controls').style.display = 'none'; }
  else { document.exitFullscreen(); $('controls').style.display = 'flex'; }
}

function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  all.forEach(function (el, i) {
    el.classList.remove('newest', 'oldest');
    if (all.length - 1 - i <= 2) el.classList.add('newest');
    else el.classList.add('oldest');
  });
}

function displayFinalLine(text, skipFirebase) {
  $('placeholder').style.display = 'none';
  var linesEl = $('translation-lines');
  var lastLine = linesEl.lastChild;
  if (lastLine && lastLine.classList.contains('tline') && lastLine.textContent.length < SHORT_LINE_CHARS) {
    var merged = lastLine.textContent + ' ' + text;
    lastLine.style.opacity = '0.5';
    setTimeout(function () {
      if (!lastLine || !lastLine.parentNode) return;
      lastLine.textContent = merged;
      lastLine.style.opacity = '1';
    }, 200);
    if (!skipFirebase && lastFirebaseKey) translationsRef.child(lastFirebaseKey).update({ text: merged });
    reclassLines();
    return lastLine;
  }
  var div = document.createElement('div');
  div.className = 'tline newest';
  div.textContent = text;
  linesEl.appendChild(div);
  while (linesEl.children.length > MAX_LINES) linesEl.removeChild(linesEl.firstChild);
  reclassLines();
  return div;
}

function pushHistory(text) {
  historyLog.push(text);
  if (historyLog.length > 8) historyLog.shift();
}

function setStreamingText(text) {
  var el = $('streaming-line'), t = $('streaming-text'), cur = $('streaming-cursor');
  if (!text) { el.classList.add('empty'); t.textContent = ''; cur.style.display = 'none'; }
  else { $('placeholder').style.display = 'none'; el.classList.remove('empty'); t.textContent = text; cur.style.display = 'inline-block'; }
}

function clearTranslations() {
  translationsRef.remove();
  $('translation-lines').innerHTML = '';
  setStreamingText('');
  fullTranscript = ''; cursor = 0;
  lastFirebaseKey = null;
  translationQueue = [];
  autoSermonContext = '';
  contextUpdateCounter = 0;
  $('placeholder').style.display = 'block';
}

// ── SPEECH RECOGNITION ────────────────────────────────────────────────────────
function toggleListening() { if (isListening) stopListening(); else startListening(); }

function startListening() {
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Please use Google Chrome.'); return; }
  isListening = true;
  fullTranscript = ''; cursor = 0;
  translationQueue = [];
  lastActivityTime = Date.now();
  $('startBtn').textContent = '■ Stop';
  $('startBtn').classList.add('active');
  $('mic-indicator').classList.add('active');
  setStatus('🎤 Listening…', 'listening');
  spawnRec();
  startWatchdog();
}

function stopListening() {
  isListening = false;
  clearTimeout(silenceTimer);     silenceTimer = null;
  clearTimeout(forceCommitTimer); forceCommitTimer = null;
  clearInterval(watchdogTimer);   watchdogTimer = null;
  clearTimeout(proactiveTimer);   proactiveTimer = null;
  if (recNext) { try { recNext.onend = null; recNext.abort(); } catch (e) {} recNext = null; }
  if (rec)     { try { rec.onend = null; rec.stop(); } catch (e) {} rec = null; }
  $('startBtn').textContent = '▶ Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  fullTranscript = ''; cursor = 0;
  setStatus('Stopped');
}

function startWatchdog() {
  clearInterval(watchdogTimer);
  watchdogTimer = setInterval(function () {
    if (!isListening) { clearInterval(watchdogTimer); return; }
    if (Date.now() - lastActivityTime > 5000) {
      dbg('watchdog restart');
      if (rec) { try { rec.onend = null; rec.stop(); } catch (e) {} rec = null; }
      var unsent = fullTranscript.slice(cursor).trim();
      if (unsent) enqueueTranslation(unsent);
      fullTranscript = ''; cursor = 0;
      lastActivityTime = Date.now();
      setTimeout(spawnRec, 50);
    }
  }, 3000);
}

function spawnRec() {
  if (!isListening) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function preWarmNext() {
    if (!isListening || recNext) return;
    var next = new SR();
    next.lang = 'ko-KR'; next.continuous = true; next.interimResults = true;
    next.onend   = function () { if (recNext === next) recNext = null; };
    next.onerror = function () { if (recNext === next) recNext = null; };
    try { next.start(); recNext = next; } catch (e) { recNext = null; }
  }

  function scheduleProactive() {
    clearTimeout(proactiveTimer);
    proactiveTimer = setTimeout(function () {
      if (!isListening) return;
      dbg('proactive swap');
      var unsent = fullTranscript.slice(cursor).trim();
      var incoming = recNext || new SR();
      recNext = null;
      attachHandlers(incoming);
      try { incoming.start(); } catch (e) {}
      var old = rec; rec = incoming;
      if (old) { try { old.onend = null; old.abort(); } catch (e) {} }
      fullTranscript = unsent; cursor = 0;
      scheduleProactive();
      scheduleForceCommit();
    }, PROACTIVE_MS);
  }

  function attachHandlers(r) {
    r.lang = 'ko-KR'; r.continuous = true; r.interimResults = true;

    r.onresult = function (e) {
      if (r !== rec) return;
      lastActivityTime = Date.now();
      var full = '', interimText = '';
      for (var i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) full += e.results[i][0].transcript;
        else interimText += e.results[i][0].transcript;
      }
      fullTranscript = (full + interimText).trim();
      var unsent = fullTranscript.slice(cursor).trim();
      $('interim-text').textContent = interimText
        ? '"' + interimText.trim() + '"'
        : (unsent ? '"' + unsent + '"' : '');
      dbg('len:' + fullTranscript.length + ' cursor:' + cursor + ' unsent:' + unsent.length + ' q:' + translationQueue.length);
      if (!unsent) return;
      clearTimeout(silenceTimer);
      if (unsent.length >= MAX_CHARS) { commitTranslation(); return; }
      silenceTimer = setTimeout(commitTranslation, SILENCE_MS);
    };

    r.onerror = function (e) {
      if (r !== rec) return;
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      if (e.error === 'not-allowed') { showError('Microphone access denied.'); stopListening(); }
    };

    r.onend = function () {
      if (r !== rec) return;
      lastActivityTime = Date.now();
      if (!isListening) return;
      var unsent = fullTranscript.slice(cursor).trim();
      if (unsent) enqueueTranslation(unsent);
      fullTranscript = ''; cursor = 0;
      clearTimeout(silenceTimer);     silenceTimer = null;
      clearTimeout(forceCommitTimer); forceCommitTimer = null;
      setTimeout(spawnRec, 50);
    };
  }

  var r = new SR();
  attachHandlers(r);
  rec = r;
  try { r.start(); } catch (e) {}
  scheduleForceCommit();
  scheduleProactive();
  setTimeout(preWarmNext, PROACTIVE_MS - 2000);
}

function scheduleForceCommit() {
  clearTimeout(forceCommitTimer);
  forceCommitTimer = setTimeout(function forceNext() {
    if (!isListening) return;
    var unsent = fullTranscript.slice(cursor).trim();
    if (unsent) commitTranslation();
    else forceCommitTimer = setTimeout(forceNext, FORCE_COMMIT_MS);
  }, FORCE_COMMIT_MS);
}

function commitTranslation() {
  clearTimeout(silenceTimer); silenceTimer = null;
  var unsent = fullTranscript.slice(cursor).trim();
  if (!unsent) return;
  cursor = fullTranscript.length;
  $('interim-text').textContent = '';
  scheduleForceCommit();
  enqueueTranslation(unsent);
}

function enqueueTranslation(text) {
  if (!text || text.trim().length < 10) return;
  translationQueue.push(text);
  processQueue();
}

function processQueue() {
  if (isTranslating || translationQueue.length === 0) return;
  triggerTranslation(translationQueue.shift(), 0);
}

// ── LIBRARY ───────────────────────────────────────────────────────────────────
var cachedLibrary = [];
libraryRef.on('value', function (snap) {
  cachedLibrary = Object.values(snap.val() || {});
});

function buildLibraryContext() {
  if (!cachedLibrary.length) return '';
  var entries = cachedLibrary.slice(-20).map(function (e) {
    var line = '• ' + (e.korean ? e.korean + ' → ' : '') + e.english;
    if (e.note) line += ' (' + e.note + ')';
    return line;
  }).join('\n');
  return 'Correction library — known phrases and proper nouns for this pastor:\n' + entries + '\n\n';
}

// ── AUTO CONTEXT BUILDER ──────────────────────────────────────────────────────
function updateSermonContext() {
  contextUpdateCounter++;
  if (contextUpdateCounter % 3 !== 0) return;
  var recentLines = historyLog.slice(-8).join(' ');
  if (!recentLines) return;
  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 80,
      stream: false,
      system: 'You are summarizing a live sermon for use as translation context. '
        + 'Given the recent translated lines, write a single short sentence (max 20 words) '
        + 'describing the current topic, speaker situation, and any key context that would help '
        + 'interpret ambiguous colloquial Korean phrases. Be specific and factual. No preamble.',
      messages: [{ role: 'user', content: 'Recent sermon lines:\n' + recentLines + '\n\nSummarize the current context in one short sentence.' }]
    })
  }).then(function (r) { return r.json(); }).then(function (d) {
    if (d && d.content && d.content[0]) {
      autoSermonContext = d.content[0].text.trim();
      dbg('ctx: ' + autoSermonContext.slice(0, 50));
    }
  }).catch(function () {});
}

// ── TRANSLATION ───────────────────────────────────────────────────────────────
async function triggerTranslation(text, attempt) {
  isTranslating = true;
  setStatus('Translating…', 'translating');
  clearError();

  var controller = new AbortController();
  var timeout = setTimeout(function () { controller.abort(); }, REQUEST_TIMEOUT);

  var manualTopic = $('sermonContext').value.trim();
  var topicLine   = manualTopic ? 'Sermon topic: ' + manualTopic + '\n\n' : '';
  var contextLine = autoSermonContext ? 'Running sermon context (use to interpret ambiguous phrases): ' + autoSermonContext + '\n\n' : '';
  var libraryLine = buildLibraryContext();
  var historyStr  = historyLog.length
    ? 'Recent translations — use for tone, vocabulary, and continuity:\n'
      + historyLog.slice(-8).map(function (h) { return 'EN: ' + h; }).join('\n') + '\n\n'
      + 'The previous translation ended with: "' + historyLog[historyLog.length - 1] + '"\n'
      + 'Your translation must connect smoothly to this — if the new chunk continues the same thought or narrative, begin with a natural connector (e.g. "And", "So", "Then") rather than starting a new disconnected sentence.\n\n'
    : '';

  var systemPrompt =
    'You are a live interpreter for a Korean Christian worship service. '
    + 'Translate the full meaning of what was said into natural, faithful English. '
    + 'The input may begin mid-sentence due to live audio chunking — if so, begin your translation '
    + 'from the first complete word or thought in the input, and always end at a natural sentence '
    + 'or clause boundary, never mid-thought. '
    + 'Do not add or expand beyond what was spoken, but never omit or skip entire sentences or thoughts — '
    + 'every complete idea the speaker expressed must appear in the translation. '
    + 'Pay close attention to colloquial and conversational Korean — informal phrasing, negations, '
    + 'and implied subjects must be rendered accurately. '
    + 'When colloquial expressions are ambiguous, use the sermon context and prior lines to interpret '
    + 'the most natural meaning rather than a literal one. '
    + 'Preserve the tone and theological weight of what was said. '
    + 'Use standard English Bible vocabulary for theological terms '
    + '(e.g. grace, redemption, sanctification, covenant). '
    + 'Infer omitted grammatical subjects only when Korean grammar requires it, '
    + 'but never add content beyond what was spoken. '
    + 'When the Korean uses a person\'s name, always use that name — never substitute it with a pronoun. '
    + 'Only use a pronoun if the Korean itself used a pronoun. '
    + 'When the speaker references a proper noun — a person\'s name, TV program, book, or cultural reference — '
    + 'preserve it by name. Translate into English where a natural translation exists '
    + '(e.g. 골목식당 = "Alley Restaurant", 성경 = "Bible", 성경책 = "Bible"). '
    + 'Only romanize if there is no meaningful English translation. '
    + 'Speech recognition often mishears Korean Bible book names — correct them using context.\n\n'
    + 'IMPORTANT: Never output "..." or any placeholder. Always translate what was said, even filler '
    + 'words or transitional expressions (e.g. 아/음/그/네 → "Yes" / "And" / omit gracefully). '
    + 'If the input is genuinely unintelligible noise, respond with a single space " ". '
    + 'Never skip or omit a response.\n\n'
    + 'Common Korean Bible books: 창세기(Genesis) 출애굽기(Exodus) 레위기(Leviticus) 민수기(Numbers) '
    + '신명기(Deuteronomy) 여호수아(Joshua) 사사기(Judges) 룻기(Ruth) 사무엘상하(1-2Samuel) '
    + '열왕기상하(1-2Kings) 역대상하(1-2Chronicles) 에스라(Ezra) 느헤미야(Nehemiah) 에스더(Esther) '
    + '욥기(Job) 시편(Psalms) 잠언(Proverbs) 전도서(Ecclesiastes) 이사야(Isaiah) 예레미야(Jeremiah) '
    + '에스겔(Ezekiel) 다니엘(Daniel) 마태복음(Matthew) 마가복음(Mark) 누가복음(Luke) 요한복음(John) '
    + '사도행전(Acts) 로마서(Romans) 고린도전후서(1-2Corinthians) 갈라디아서(Galatians) '
    + '에베소서(Ephesians) 빌립보서(Philippians) 골로새서(Colossians) 히브리서(Hebrews) '
    + '야고보서(James) 요한계시록(Revelation)\n\n'
    + 'Respond with ONLY the translation, nothing else.';

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 600,
        stream: false,
        system: systemPrompt,
        messages: [{ role: 'user', content: topicLine + contextLine + libraryLine + historyStr + 'Translate:\n' + text }]
      })
    });

    clearTimeout(timeout);

    if (!res.ok) {
      var errData = await res.json();
      showError('API error: ' + (errData && errData.error ? errData.error.message : 'HTTP ' + res.status));
      isTranslating = false; processQueue(); return;
    }

    var data = await res.json();
    var result = data && data.content && data.content[0] ? data.content[0].text.trim() : null;

    if (result && /^[\s.…]+$/.test(result)) result = null;
    if (result && /[\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/.test(result)) result = null;

    if (result) {
      var lastStop = Math.max(result.lastIndexOf('.'), result.lastIndexOf('!'), result.lastIndexOf('?'));
      if (lastStop > 0 && lastStop > result.length * 0.3) result = result.slice(0, lastStop + 1).trim();
      else result = result.replace(/[\s,\-–—]+$/, '').trim();
    }

    if (result) {
      try {
        var newRef = translationsRef.push({ text: result, timestamp: firebase.database.ServerValue.TIMESTAMP });
        if (newRef) lastFirebaseKey = newRef.key;
      } catch (fbErr) { dbg('firebase err: ' + fbErr.message); }
      displayFinalLine(result, true);
      pushHistory(result);
      updateSermonContext();
    }

    isTranslating = false;
    setStatus('🎤 Listening…', 'listening');
    dbg('done | q:' + translationQueue.length + (autoSermonContext ? ' | ctx ok' : ''));
    processQueue();

  } catch (err) {
    clearTimeout(timeout);
    if (attempt < MAX_RETRIES) {
      dbg('retry ' + (attempt + 1) + '/' + MAX_RETRIES);
      isTranslating = false;
      setTimeout(function () { triggerTranslation(text, attempt + 1); }, 1000);
    } else {
      if (err.name !== 'AbortError') showError('Network error: ' + err.message);
      dbg('gave up after ' + MAX_RETRIES + ' retries');
      isTranslating = false;
      processQueue();
    }
  }
}
</script>
</body>
</html>
