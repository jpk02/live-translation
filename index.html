<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #f0f0f0; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #controls { background: #111; border-bottom: 1px solid #222; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
  input[type="text"] { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; padding: 6px 10px; font-size: 13px; width: 260px; }
  button { border: none; border-radius: 6px; padding: 7px 18px; font-size: 13px; cursor: pointer; font-weight: 600; }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #aaaaaa; }
  #status.error { color: #e74c3c; }
  #error-box { display: none; background: #1a0000; border: 1px solid #500; border-radius: 8px; padding: 10px 16px; font-size: 12px; color: #ff6b6b; margin: 6px 20px; font-family: monospace; word-break: break-all; flex-shrink: 0; }

  /* Display takes all remaining space, lines anchor to bottom */
  #display {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr auto auto;
    align-items: end;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  #placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #2a2a2a;
    pointer-events: none;
    transition: opacity 0.5s;
    width: 100%;
  }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }

  /* Lines stack naturally at the bottom — no fixed height needed */
  #translation-lines {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: center;
  }

  .tline {
    font-size: clamp(18px, 2.5vw, 36px);
    line-height: 1.45;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    /* start invisible & shifted down */
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s ease, transform 0.5s ease, color 1s ease;
  }
  .tline.show   { opacity: 1; transform: translateY(0); }
  .tline.newest { color: #ffffff; }
  .tline.mid    { color: #999999; }
  .tline.oldest { color: #444444; }

  #interim-text { font-size: clamp(11px,1.2vw,16px); color: #2a2a2a; margin-top: 14px; font-style: italic; min-height: 1.2em; font-family: sans-serif; text-align: center; width: 100%; max-width: 1200px; }

  #debug-badge { position: fixed; bottom: 24px; left: 20px; font-size: 11px; font-family: monospace; color: #555; background: #111; padding: 4px 8px; border-radius: 4px; border: 1px solid #222; pointer-events: none; }
  #mic-indicator { position: fixed; bottom: 24px; right: 28px; width: 14px; height: 14px; border-radius: 50%; background: #333; }
  #mic-indicator.active { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div id="controls">
  <label style="font-size:13px;color:#888;">Sermon topic:</label>
  <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
  <button id="startBtn" onclick="toggleListening()">&#9654; Start</button>
  <button id="clearBtn" onclick="clearTranslations()" style="background:#555;color:#ccc;">&#9003; Clear</button>
  <span id="status">Ready</span>
  <button id="fullscreenBtn" onclick="toggleFullscreen()">&#9974; Fullscreen</button>
</div>
<div id="error-box"></div>

<div id="display">
  <div id="placeholder"><h1>CHIU YANG CHURCH</h1></div>
  <div id="translation-lines"></div>
  <div id="interim-text"></div>
</div>
<div id="mic-indicator"></div>
<div id="debug-badge">ready</div>

<script>
var WORKER_URL = 'https://live-translation.pauljkim22.workers.dev';
var SILENCE_MS = 1000;   // commit after 1s silence
var MAX_CHARS  = 50;     // hard cap — only triggers if no natural break found
var MAX_LINES  = 5;

var firebaseConfig = {
  apiKey: "AIzaSyCqzFwELPmWwDWrbTILL1L-opT0xlKMOPs",
  authDomain: "live-translation-fd583.firebaseapp.com",
  databaseURL: "https://live-translation-fd583-default-rtdb.firebaseio.com",
  projectId: "live-translation-fd583",
  storageBucket: "live-translation-fd583.firebasestorage.app",
  messagingSenderId: "189364035896",
  appId: "1:189364035896:web:552700e29449859089a1cd"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var translationsRef = db.ref('translations');
var isOperator = window.location.search.includes('operator');
function $(id){ return document.getElementById(id); }

// ── VIEWER ───────────────────────────────────
if (!isOperator) {
  document.addEventListener('DOMContentLoaded', function() {
    $('controls').style.display    = 'none';
    $('error-box').style.display   = 'none';
    $('interim-text').style.display = 'none';
    $('debug-badge').style.display  = 'none';
    var seenKeys = new Set();
    translationsRef.limitToLast(10).once('value', function(snap) {
      snap.forEach(function(child) {
        seenKeys.add(child.key);
        var it = child.val();
        if (it && it.text) displayFinalLine(it.text, true);
      });
      translationsRef.on('child_added', function(snap) {
        if (seenKeys.has(snap.key)) return;
        seenKeys.add(snap.key);
        var it = snap.val();
        if (it && it.text) displayFinalLine(it.text, true);
      });
    });
    translationsRef.on('value', function(snap) {
      if (!snap.val()) {
        $('translation-lines').innerHTML = '';
        $('placeholder').style.opacity = '1';
        seenKeys.clear();
      }
    });
  });
}

// ── OPERATOR STATE ────────────────────────────
var rec = null, isListening = false, silenceTimer = null;
var isTranslating = false, historyLog = [];
var fullTranscript = '', cursor = 0;

// ── UI ────────────────────────────────────────
function showError(msg){ $('error-box').style.display='block'; $('error-box').textContent=msg; setStatus('Error','error'); }
function clearError(){ $('error-box').style.display='none'; }
function setStatus(msg,cls){ $('status').textContent=msg; $('status').className=cls||''; }
function dbg(msg){ var el=$('debug-badge'); if(el) el.textContent=msg; }
function toggleFullscreen(){
  if (!document.fullscreenElement){ document.documentElement.requestFullscreen(); $('controls').style.display='none'; }
  else { document.exitFullscreen(); $('controls').style.display='flex'; }
}

// ── DISPLAY ───────────────────────────────────
function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  all.forEach(function(el, i) {
    el.classList.remove('newest','mid','oldest');
    var fromBottom = all.length - 1 - i;
    if (fromBottom === 0)     el.classList.add('newest');
    else if (fromBottom <= 2) el.classList.add('mid');
    else                      el.classList.add('oldest');
  });
}

function displayFinalLine(text, skipFirebase) {
  $('placeholder').style.opacity = '0';

  var linesEl = $('translation-lines');
  var div = document.createElement('div');
  div.className = 'tline';
  div.textContent = text;
  linesEl.appendChild(div);

  // prune oldest beyond MAX_LINES — fade them out first
  while (linesEl.children.length > MAX_LINES) {
    var old = linesEl.firstChild;
    old.style.transition = 'opacity 0.3s';
    old.style.opacity = '0';
    setTimeout(function(el){ el.parentNode && el.parentNode.removeChild(el); }, 300, old);
  }

  reclassLines();

  // slide new line in on next paint
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ div.classList.add('show'); });
  });

  if (!skipFirebase) {
    translationsRef.push({ text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
  }
}

function clearTranslations(){
  translationsRef.remove();
  $('translation-lines').innerHTML = '';
  $('placeholder').style.opacity = '1';
  fullTranscript = ''; cursor = 0;
}

// ── SPEECH ────────────────────────────────────
function toggleListening(){ if(isListening) stopListening(); else startListening(); }

function startListening(){
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showError('Please use Google Chrome.'); return; }
  isListening = true; fullTranscript = ''; cursor = 0;
  $('startBtn').textContent = '\u25a0 Stop';
  $('startBtn').classList.add('active');
  $('mic-indicator').classList.add('active');
  setStatus('\ud83c\udfa4 Listening\u2026', 'listening');
  spawnRec();
}

function spawnRec(){
  if (!isListening) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = 'ko-KR'; rec.continuous = true; rec.interimResults = true;

  rec.onresult = function(e){
    var full = '';
    for (var i = 0; i < e.results.length; i++) full += e.results[i][0].transcript;
    full = full.trim(); fullTranscript = full;
    var unsent = full.slice(cursor).trim();
    $('interim-text').textContent = unsent ? '\u201c' + unsent + '\u201d' : '';
    dbg('unsent:' + unsent.length + ' cursor:' + cursor);
    if (!unsent) return;
    clearTimeout(silenceTimer);
    // Commit immediately if we hit a natural sentence-end punctuation
    var endsNaturally = /[.!?,\u3002\uff0c\uff01\uff1f]\s*$/.test(unsent);
    if (endsNaturally && unsent.length >= 10) { commitTranslation(); return; }
    // Hard cap only as a fallback — avoids mid-word cuts
    if (unsent.length >= MAX_CHARS) { commitTranslation(); return; }
    silenceTimer = setTimeout(commitTranslation, SILENCE_MS);
  };

  rec.onerror = function(e){
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed'){ showError('Microphone access denied.'); stopListening(); }
  };

  rec.onend = function(){
    if (!isListening) return;
    fullTranscript = ''; cursor = 0;
    setTimeout(spawnRec, 150);
  };

  try { rec.start(); } catch(e){}
}

function commitTranslation(){
  clearTimeout(silenceTimer); silenceTimer = null;
  if (isTranslating) return;
  var unsent = fullTranscript.slice(cursor).trim();
  if (!unsent) return;
  cursor = fullTranscript.length;
  $('interim-text').textContent = '';
  triggerTranslation(unsent);
}

function stopListening(){
  isListening = false; clearTimeout(silenceTimer); silenceTimer = null;
  if (rec){ try{ rec.onend=null; rec.stop(); }catch(e){} rec=null; }
  $('startBtn').textContent = '\u25ba Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  fullTranscript = ''; cursor = 0;
  setStatus('Stopped');
}

// ── TRANSLATION ───────────────────────────────
async function triggerTranslation(text){
  if (isTranslating) return;
  isTranslating = true; setStatus('Translating\u2026','translating'); clearError();

  var safety = setTimeout(function(){
    if (!isTranslating) return;
    isTranslating = false; setStatus('\ud83c\udfa4 Listening\u2026','listening'); afterTranslation();
  }, 15000);

  var ctx    = $('sermonContext').value.trim();
  var prompt = (ctx ? 'Sermon topic: ' + ctx + '\n\n' : '')
             + (historyLog.length ? 'Recent:\n' + historyLog.slice(-2).map(function(h){ return 'EN: '+h; }).join('\n') + '\n\n' : '')
             + 'Translate:\n' + text;

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5', max_tokens: 120, stream: false,
        system: 'You are a live interpreter for a Korean Christian worship service. Translate Korean to natural English. Output 1 short sentence only — never more. Keep it concise; this appears live on screen. Use simple, reverent language. Infer omitted subjects from context. Correct misheared Korean Bible book names.\nKorean Bible books: 창세기(Genesis) 출애굽기(Exodus) 레위기(Leviticus) 민수기(Numbers) 신명기(Deuteronomy) 여호수아(Joshua) 사사기(Judges) 룻기(Ruth) 사무엘상하(1-2Samuel) 열왕기상하(1-2Kings) 역대상하(1-2Chronicles) 에스라(Ezra) 느헤미야(Nehemiah) 에스더(Esther) 욥기(Job) 시편(Psalms) 잠언(Proverbs) 전도서(Ecclesiastes) 이사야(Isaiah) 예레미야(Jeremiah) 에스겔(Ezekiel) 다니엘(Daniel) 호세아(Hosea) 요엘(Joel) 아모스(Amos) 요나(Jonah) 미가(Micah) 말라기(Malachi) 마태복음(Matthew) 마가복음(Mark) 누가복음(Luke) 요한복음(John) 사도행전(Acts) 로마서(Romans) 고린도전후서(1-2Corinthians) 갈라디아서(Galatians) 에베소서(Ephesians) 빌립보서(Philippians) 골로새서(Colossians) 히브리서(Hebrews) 야고보서(James) 베드로전후서(1-2Peter) 요한계시록(Revelation)\nRespond with ONLY the translation.',
        messages: [{ role:'user', content: prompt }]
      })
    });
    clearTimeout(safety);
    if (!res.ok){ var e=await res.json(); showError('API error: '+(e&&e.error?e.error.message:'HTTP '+res.status)); isTranslating=false; afterTranslation(); return; }
    var data = await res.json();
    var result = data&&data.content&&data.content[0] ? data.content[0].text.trim() : null;
    if (result){ displayFinalLine(result); historyLog.push(result); if(historyLog.length>6) historyLog.shift(); }
    isTranslating = false; setStatus('\ud83c\udfa4 Listening\u2026','listening');
    dbg('done | history:'+historyLog.length);
    afterTranslation();
  } catch(err){
    clearTimeout(safety);
    if (err.name!=='AbortError') showError('Network error: '+err.message);
    isTranslating = false; afterTranslation();
  }
}

function afterTranslation(){
  var unsent = fullTranscript.slice(cursor).trim();
  if (unsent.length > 8){ cursor = fullTranscript.length; $('interim-text').textContent=''; triggerTranslation(unsent); }
}
</script>
</body>
</html>
