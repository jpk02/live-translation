<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Live Sermon Translation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --ink: #1a1714;
      --muted: #7a7168;
      --gold: #c9a84c;
      --gold-light: #e8d9a8;
      --error: #b84c4c;
      --border: #e2ddd5;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background cross pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 440px;
      padding: 48px 40px;
      position: relative;
      box-shadow: 0 2px 24px rgba(26,23,20,0.06);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '✦';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: var(--gold);
      font-size: 18px;
      padding: 0 8px;
      line-height: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 500;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--cream);
      transition: border-color 0.15s, background 0.15s;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
      background: white;
    }

    input::placeholder {
      color: #c4bdb4;
    }

    .slug-preview {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }

    .slug-preview span {
      color: var(--gold);
      font-weight: 500;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn:hover { background: #2e2a26; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: #c4bdb4; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #fdf0f0;
      border: 1px solid #e8c4c4;
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 18px;
      display: none;
    }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #a7d8b0;
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 13px;
      color: #2d6a3f;
      margin-bottom: 18px;
      display: none;
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Register your church</h1>
      <p>Create an account to get started with live sermon translation.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="divider"><span>Your account</span></div>

    <div class="field">
      <label for="fullName">Your name</label>
      <input type="text" id="fullName" placeholder="Pastor John Kim" autocomplete="name" />
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@church.org" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" />
    </div>

    <div class="divider"><span>Your church</span></div>

    <div class="field">
      <label for="churchName">Church name</label>
      <input type="text" id="churchName" placeholder="Chiu Yang Church" />
      <div class="slug-preview" id="slugPreview"></div>
    </div>

    <button class="btn" id="submitBtn" onclick="handleSignup()">Create account</button>

    <div class="footer-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zhrkwgpjvgessiqmmefn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpocmt3Z3Bqdmdlc3NpcW1tZWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTUzMjksImV4cCI6MjA5MDQ3MTMyOX0.JoDcJXtL5il1sprbdf2M3XyyyN7BtdwmwY3hP3BrQ8Q';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function toSlug(name) {
      return name.toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .trim()
        .replace(/\s+/g, '');
    }

    document.getElementById('churchName').addEventListener('input', function() {
      const slug = toSlug(this.value);
      const preview = document.getElementById('slugPreview');
      if (slug) {
        preview.innerHTML = `Your viewer URL: <span>…/${slug}</span>`;
      } else {
        preview.innerHTML = '';
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function handleSignup() {
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const churchName = document.getElementById('churchName').value.trim();
      const slug = toSlug(churchName);

      if (!fullName || !email || !password || !churchName) {
        return showError('Please fill in all fields.');
      }
      if (password.length < 8) {
        return showError('Password must be at least 8 characters.');
      }
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        return showError('Passwords do not match.');
      }
      if (!slug) {
        return showError('Please enter a valid church name.');
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account…';
      document.getElementById('errorMsg').style.display = 'none';

      try {
        // 1. Check slug availability
        const { data: existing } = await supabase
          .from('churches')
          .select('id')
          .eq('slug', slug)
          .single();

        if (existing) {
          btn.disabled = false;
          btn.textContent = 'Create account';
          return showError(`The URL "${slug}" is already taken. Try a different church name.`);
        }

        // 2. Sign up user
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName }
          }
        });

        if (authError) throw authError;

        const userId = authData.user.id;

        // 3. Create church
        const { data: church, error: churchError } = await supabase
          .from('churches')
          .insert({ name: churchName, slug })
          .select()
          .single();

        if (churchError) throw churchError;

        // 4. Create profile
        const { error: profileError } = await supabase
          .from('profiles')
          .insert({
            id: userId,
            church_id: church.id,
            role: 'admin',
            full_name: fullName,
            email
          });

        if (profileError) throw profileError;

        showSuccess('Account created! Check your email to confirm, then sign in.');
        btn.textContent = 'Account created';

      } catch (err) {
        console.error(err);
        showError(err.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }
  </script>
</body>
</html>
