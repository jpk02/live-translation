<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #controls {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  input[type="text"] {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 6px;
    color: #f0f0f0;
    padding: 6px 10px;
    font-size: 13px;
    width: 260px;
  }
  button {
    border: none;
    border-radius: 6px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #f39c12; }
  #status.error { color: #e74c3c; }
  #error-box {
    display: none;
    background: #1a0000;
    border: 1px solid #500;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 6px 20px;
    font-family: monospace;
    word-break: break-all;
    flex-shrink: 0;
  }
  #display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 40px 60px;
    position: relative;
    overflow: hidden;
  }
  #placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #2a2a2a;
    pointer-events: none;
  }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }
  #placeholder p { font-size: 16px; margin-top: 12px; color: #1e1e1e; }
  #translation-box { width: 100%; max-width: 1200px; text-align: center; }
  #translation-lines { display: flex; flex-direction: column; gap: 32px; margin-bottom: 12px; }
  .tline {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: color 0.5s, opacity 0.5s;
  }
  .tline.newest { color: #ffffff; }
  .tline.older  { color: #777777; }
  .tline.oldest { color: #3a3a3a; }
  #interim-text {
    font-size: clamp(13px, 1.6vw, 20px);
    color: #444;
    margin-top: 18px;
    font-style: italic;
    min-height: 1.4em;
    font-family: sans-serif;
  }
  #mic-indicator {
    position: fixed;
    bottom: 24px; right: 28px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #333;
  }
  #mic-indicator.active {
    background: #2ecc71;
    box-shadow: 0 0 10px #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
</style>
</head>
<body>

<div id="controls">
  <label style="font-size:13px;color:#888;">Sermon topic:</label>
  <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
  <button id="startBtn" onclick="toggleListening()">▶ Start</button>
  <span id="status">Ready</span>
  <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>
<div id="error-box"></div>

<div id="display">
  <div id="placeholder">
    <h1>LIVE TRANSLATION</h1>
    <p>Korean → English</p>
  </div>
  <div id="translation-box">
    <div id="translation-lines"></div>
    <div id="interim-text"></div>
  </div>
</div>
<div id="mic-indicator"></div>

<script>
// ===== CONFIG =====
var WORKER_URL = 'https://live-translation.pauljkim22.workers.dev';
// ==================

var rec = null;
var isListening = false;
var translateTimer = null;
var rollingTimer = null;
var pending = '';
var isTranslating = false;
var historyLog = [];

function $(id) { return document.getElementById(id); }

function showError(msg) {
  $('error-box').style.display = 'block';
  $('error-box').textContent = msg;
  setStatus('Error', 'error');
}
function clearError() { $('error-box').style.display = 'none'; }
function setStatus(msg, cls) {
  $('status').textContent = msg;
  $('status').className = cls || '';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    $('controls').style.display = 'none';
  } else {
    document.exitFullscreen();
    $('controls').style.display = 'flex';
  }
}

function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  all.forEach(function(el, i) {
    el.classList.remove('newest', 'older', 'oldest');
    var fromBottom = all.length - 1 - i;
    if (fromBottom === 0) el.classList.add('newest');
    else if (fromBottom === 1) el.classList.add('older');
    else el.classList.add('oldest');
  });
}

function displayTranslation(text) {
  $('placeholder').style.display = 'none';
  var linesEl = $('translation-lines');
  var displayEl = $('display');
  var div = document.createElement('div');
  div.className = 'tline newest';
  div.textContent = text;
  div.style.opacity = '0';
  linesEl.appendChild(div);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { div.style.opacity = '1'; });
  });
  reclassLines();
  requestAnimationFrame(function() {
    var maxHeight = displayEl.clientHeight - 80;
    while (linesEl.scrollHeight > maxHeight && linesEl.children.length > 1) {
      linesEl.removeChild(linesEl.firstChild);
      reclassLines();
    }
  });
}

function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Please use Google Chrome.'); return; }

  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = function() {
    isListening = true;
    $('startBtn').textContent = '■ Stop';
    $('startBtn').classList.add('active');
    $('mic-indicator').classList.add('active');
    setStatus('🎤 Listening…', 'listening');
    $('placeholder').style.display = 'none';
    rollingTimer = setInterval(function() {
      if (pending.trim() && !isTranslating) translateText(pending.trim());
    }, 2000);
  };

  rec.onresult = function(e) {
    var interim = '', final = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) $('interim-text').textContent = '"' + interim + '"';
    if (final) {
      $('interim-text').textContent = '';
      pending += ' ' + final.trim();
      clearTimeout(translateTimer);
      translateTimer = setTimeout(function() {
        if (pending.trim() && !isTranslating) translateText(pending.trim());
      }, 400);
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed') { showError('Microphone access denied.'); stopListening(); }
  };

  rec.onend = function() {
    if (isListening) setTimeout(function() {
      if (isListening) { try { rec.start(); } catch(e) {} }
    }, 200);
  };

  rec.start();
}

function stopListening() {
  isListening = false;
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  if (rollingTimer) { clearInterval(rollingTimer); rollingTimer = null; }
  clearTimeout(translateTimer);
  $('startBtn').textContent = '▶ Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  setStatus('Stopped');
}

function translateText(text, retryCount) {
  retryCount = retryCount || 0;
  if (isTranslating) return;
  isTranslating = true;
  pending = '';
  setStatus('Translating…', 'translating');
  clearError();

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Recent:\n' + historyLog.slice(-2).reverse().map(function(h, i) {
        return i + ': KO: ' + h.ko + ' | EN: ' + h.en;
      }).join('\n') + '\n\n'
    : '';

  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 150,
      system: 'You are a live interpreter for a Christian worship service. Translate Korean into natural, reverent English. Korean often omits subjects — infer from context. Keep any English words as-is.\n\nRespond ONLY in this JSON format:\n{"translation":"english text","corrections":[{"index":0,"text":"corrected line"}]}\n\nOnly include corrections when a subject/pronoun was clearly wrong. Return ONLY valid JSON.',
      messages: [{ role: 'user', content: sermonLine + contextStr + 'Translate:\n' + text }]
    })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.json().then(function(err) {
        var msg = err && err.error && err.error.message ? err.error.message : 'HTTP ' + res.status;
        if (res.status === 529 || msg.toLowerCase().includes('overload')) {
          if (retryCount < 3) {
            setStatus('Server busy, retrying…', 'translating');
            setTimeout(function() { isTranslating = false; translateText(text, retryCount + 1); }, 2000 * (retryCount + 1));
          } else {
            showError('Server overloaded. Try again shortly.');
          }
        } else {
          showError('API error: ' + msg);
        }
      });
    }
    return res.json().then(function(data) {
      var raw = data && data.content && data.content[0] ? data.content[0].text.trim() : null;
      if (!raw) { showError('No response from API.'); return; }
      var parsed;
      try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
      catch(e) { parsed = { translation: raw, corrections: [] }; }
      if (parsed.translation) {
        clearError();
        displayTranslation(parsed.translation);
        historyLog.push({ ko: text, en: parsed.translation });
        if (historyLog.length > 6) historyLog.shift();
        setStatus('🎤 Listening…', 'listening');
      } else {
        showError('Unexpected response: ' + raw);
      }
    });
  })
  .catch(function(err) { showError('Network error: ' + err.message); })
  .finally(function() {
    isTranslating = false;
    if (pending.trim()) translateText(pending.trim());
  });
}
</script>
</body>
</html>
