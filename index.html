<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #controls {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  input[type="text"] {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 6px;
    color: #f0f0f0;
    padding: 6px 10px;
    font-size: 13px;
    width: 260px;
  }
  button {
    border: none;
    border-radius: 6px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #aaaaaa; }
  #status.error { color: #e74c3c; }
  #error-box {
    display: none;
    background: #1a0000;
    border: 1px solid #500;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 6px 20px;
    font-family: monospace;
    word-break: break-all;
    flex-shrink: 0;
  }
  #display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 40px 60px;
    position: relative;
    overflow: hidden;
  }
  #placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #2a2a2a;
    pointer-events: none;
  }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }
  #translation-box { width: 100%; max-width: 1200px; text-align: center; }
  #translation-lines { display: flex; flex-direction: column; gap: 32px; margin-bottom: 12px; }

  .tline {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: color 0.5s, opacity 0.6s;
  }
  .tline.newest { color: #ffffff; }
  .tline.older  { color: #777777; }
  .tline.oldest { color: #3a3a3a; }

  /* Streaming line — same white as newest, no color flash */
  #streaming-line {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    color: #ffffff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    min-height: 1.5em;
    transition: opacity 0.3s;
  }
  #streaming-line.empty { opacity: 0; }

  #streaming-cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: #ffffff;
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #interim-text {
    font-size: clamp(13px, 1.6vw, 20px);
    color: #444;
    margin-top: 18px;
    font-style: italic;
    min-height: 1.4em;
    font-family: sans-serif;
  }
  #debug-badge {
    position: fixed;
    bottom: 24px; left: 20px;
    font-size: 11px;
    font-family: monospace;
    color: #555;
    background: #111;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #222;
    pointer-events: none;
  }
  #mic-indicator {
    position: fixed;
    bottom: 24px; right: 28px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #333;
  }
  #mic-indicator.active {
    background: #2ecc71;
    box-shadow: 0 0 10px #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div id="controls">
  <label style="font-size:13px;color:#888;">Sermon topic:</label>
  <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
  <button id="startBtn" onclick="toggleListening()">▶ Start</button>
  <button id="clearBtn" onclick="clearTranslations()" style="background:#555;color:#ccc;">⌫ Clear</button>
  <span id="status">Ready</span>
  <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>
<div id="error-box"></div>

<div id="display">
  <div id="placeholder">
    <h1>CHIU YANG CHURCH</h1>
  </div>
  <div id="translation-box">
    <div id="translation-lines"></div>
    <div id="streaming-line" class="empty">
      <span id="streaming-text"></span><span id="streaming-cursor" style="display:none"></span>
    </div>
    <div id="interim-text"></div>
  </div>
</div>
<div id="mic-indicator"></div>
<div id="debug-badge">window: 0 chunks</div>

<script>
var WORKER_URL = 'https://live-translation.pauljkim22.workers.dev';
var firebaseConfig = {
  apiKey: "AIzaSyCqzFwELPmWwDWrbTILL1L-opT0xlKMOPs",
  authDomain: "live-translation-fd583.firebaseapp.com",
  databaseURL: "https://live-translation-fd583-default-rtdb.firebaseio.com",
  projectId: "live-translation-fd583",
  storageBucket: "live-translation-fd583.firebasestorage.app",
  messagingSenderId: "189364035896",
  appId: "1:189364035896:web:552700e29449859089a1cd"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var translationsRef = db.ref('translations');
var isOperator = window.location.search.includes('operator');

var rec = null;
var isListening = false;
var translateTimer = null;    // fires quick translation after final speech
var lockTimer = null;         // fires to lock+revise after silence
var rollingTimer = null;
var pending = '';             // untranslated Korean accumulating
var isTranslating = false;
var historyLog = [];
var currentStreamText = '';
var streamAbortCtrl = null;

// Revision window: Korean fragments + their live English translations
// that are candidates for consolidation into one clean sentence
var revisionWindow = [];      // [{ko, en}]  — last few final chunks
var revisionLineEl = null;    // the DOM element currently being revised

var LOCK_SILENCE_MS = 4000;   // ms of silence before we lock & revise

function $(id) { return document.getElementById(id); }

// ---- Viewer mode ----
if (!isOperator) {
  document.addEventListener('DOMContentLoaded', function() {
    $('controls').style.display = 'none';
    $('error-box').style.display = 'none';
    $('streaming-line').style.display = 'none';
    $('interim-text').style.display = 'none';

    var childListener = null;
    function startListeningForTranslations() {
      if (childListener) { translationsRef.off('child_added', childListener); childListener = null; }
      translationsRef.limitToLast(10).once('value', function(snap) {
        var data = snap.val(), lastKey = null;
        if (data) {
          lastKey = Object.keys(data).pop();
          Object.values(data).forEach(function(item) { if (item && item.text) displayFinalLine(item.text, null, true); });
        }
        childListener = function(s) { var it = s.val(); if (it && it.text) displayFinalLine(it.text, null, true); };
        translationsRef.orderByKey().startAfter(lastKey || '0').on('child_added', childListener);
      });
    }
    startListeningForTranslations();
    translationsRef.on('value', function(snap) {
      if (!snap.val()) {
        $('translation-lines').innerHTML = '';
        $('placeholder').style.display = 'block';
        startListeningForTranslations();
      }
    });
  });
}

function showError(msg) { $('error-box').style.display='block'; $('error-box').textContent=msg; setStatus('Error','error'); }
function clearError() { $('error-box').style.display='none'; }
function setStatus(msg, cls) { $('status').textContent=msg; $('status').className=cls||''; }

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    $('controls').style.display = 'none';
  } else {
    document.exitFullscreen();
    $('controls').style.display = 'flex';
  }
}

function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  all.forEach(function(el, i) {
    el.classList.remove('newest','older','oldest');
    var fromBottom = all.length - 1 - i;
    if (fromBottom === 0) el.classList.add('newest');
    else if (fromBottom === 1) el.classList.add('older');
    else el.classList.add('oldest');
  });
}

// Display a final (locked) line.
// If reuseEl is provided, update that element in place (for revision).
// skipFirebase = true when replaying from Firebase (viewer mode).
function displayFinalLine(text, reuseEl, skipFirebase) {
  $('placeholder').style.display = 'none';
  var linesEl = $('translation-lines');

  if (reuseEl && linesEl.contains(reuseEl)) {
    // Revise in place — update text, brief flash to signal update
    reuseEl.style.opacity = '0.4';
    setTimeout(function() {
      reuseEl.textContent = text;
      reuseEl.style.opacity = '1';
    }, 180);
    return reuseEl;
  }

  var div = document.createElement('div');
  div.className = 'tline newest';
  div.textContent = text;
  div.style.opacity = '0';
  linesEl.appendChild(div);
  requestAnimationFrame(function() { requestAnimationFrame(function() { div.style.opacity = '1'; }); });
  reclassLines();
  requestAnimationFrame(function() {
    var maxH = $('display').clientHeight - 120;
    while (linesEl.scrollHeight > maxH && linesEl.children.length > 1) {
      linesEl.removeChild(linesEl.firstChild);
      reclassLines();
    }
  });

  if (!skipFirebase) {
    translationsRef.push({ text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
  }
  return div;
}

function setStreamingText(text) {
  var el = $('streaming-line');
  var t  = $('streaming-text');
  var cur= $('streaming-cursor');
  if (!text) {
    el.classList.add('empty');
    t.textContent = '';
    cur.style.display = 'none';
  } else {
    $('placeholder').style.display = 'none';
    el.classList.remove('empty');
    t.textContent = text;
    cur.style.display = 'inline-block';
  }
}

// Move streaming line into the locked stack, return the new DOM element
function lockStreamingLine(text) {
  setStreamingText('');
  if (!text || !text.trim()) return null;
  return displayFinalLine(text.trim());
}

function clearTranslations() {
  translationsRef.remove();
  $('translation-lines').innerHTML = '';
  setStreamingText('');
  revisionWindow = [];
  revisionLineEl = null;
  $('placeholder').style.display = 'block';
}

// =============================================
// REVISION: called after LOCK_SILENCE_MS silence
// Takes the last N Korean fragments + their quick
// translations and asks Claude for one clean sentence.
// =============================================
async function reviseLastChunks() {
  if (revisionWindow.length < 2) {
    // Only one chunk — nothing to merge, just clear window
    revisionWindow = [];
    revisionLineEl = null;
    return;
  }

  var koText  = revisionWindow.map(function(c){ return c.ko; }).join(' ');
  var enDraft = revisionWindow.map(function(c){ return c.en; }).join(' ');
  var targetEl = revisionLineEl; // the DOM line to update in place

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Prior sentences:\n' + historyLog.slice(-2).map(function(h){ return h.en; }).join('\n') + '\n\n'
    : '';

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        stream: false,
        system: 'You are a live interpreter for a Christian worship service. You are given Korean text that was spoken with pauses, and a rough draft English translation of the fragments. Produce ONE clean, natural, complete English sentence that best captures the full meaning. Korean verbs come last — the meaning often only becomes clear at the end. Respond with ONLY the final English sentence, nothing else.',
        messages: [{
          role: 'user',
          content: sermonLine + contextStr +
            'Korean (full utterance): ' + koText + '\n' +
            'Draft translation: ' + enDraft + '\n\n' +
            'Final translation:'
        }]
      })
    });

    if (!res.ok) { revisionWindow = []; revisionLineEl = null; return; }
    var data = await res.json();
    var revised = data && data.content && data.content[0] ? data.content[0].text.trim() : null;
    if (!revised) { revisionWindow = []; revisionLineEl = null; return; }

    // Update the DOM line in place
    if (targetEl && $('translation-lines').contains(targetEl)) {
      // Remove all lines added during this revision window except the first one
      var linesEl = $('translation-lines');
      var allLines = linesEl.querySelectorAll('.tline');
      var targetIdx = Array.prototype.indexOf.call(allLines, targetEl);
      // Remove lines after targetEl that were part of this window
      for (var i = allLines.length - 1; i > targetIdx; i--) {
        linesEl.removeChild(allLines[i]);
      }
      reclassLines();
      displayFinalLine(revised, targetEl, true);
    }

    // Update Firebase with revised text (remove old entries and push revised)
    // We use a simple approach: push the revision as the canonical version
    translationsRef.limitToLast(revisionWindow.length + 1).once('value', function(snap) {
      var data2 = snap.val();
      if (data2) {
        // Remove the partial entries and replace with revised
        var keys = Object.keys(data2);
        keys.slice(-revisionWindow.length).forEach(function(k) {
          translationsRef.child(k).remove();
        });
      }
      translationsRef.push({ text: revised, timestamp: firebase.database.ServerValue.TIMESTAMP });
    });

    historyLog.push({ en: revised });
    if (historyLog.length > 6) historyLog.shift();

  } catch(e) { /* silently fail — keep whatever was displayed */ }

  revisionWindow = [];
  revisionLineEl = null;
}

// =============================================
// SPEECH RECOGNITION
// =============================================
function toggleListening() { if (isListening) stopListening(); else startListening(); }

function startListening() {
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Please use Google Chrome.'); return; }

  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = function() {
    isListening = true;
    $('startBtn').textContent = '■ Stop';
    $('startBtn').classList.add('active');
    $('mic-indicator').classList.add('active');
    setStatus('🎤 Listening…', 'listening');
    rollingTimer = setInterval(function() {
      if (pending.trim() && !isTranslating) triggerTranslation(pending.trim(), false);
    }, 2500);
  };

  rec.onresult = function(e) {
    var interim = '', final = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) $('interim-text').textContent = '"' + interim + '"';
    if (final) {
      $('interim-text').textContent = '';
      pending += ' ' + final.trim();
      clearTimeout(translateTimer);
      // Translate quickly after each final result
      translateTimer = setTimeout(function() {
        if (pending.trim() && !isTranslating) triggerTranslation(pending.trim(), false);
      }, 350);
      // Reset the lock/revise timer on every new speech
      resetLockTimer();
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed') { showError('Microphone access denied.'); stopListening(); }
  };

  rec.onend = function() {
    if (isListening) setTimeout(function() {
      if (isListening) { try { rec.start(); } catch(ex) {} }
    }, 200);
  };

  rec.start();
}

function stopListening() {
  isListening = false;
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  if (rollingTimer) { clearInterval(rollingTimer); rollingTimer = null; }
  clearTimeout(translateTimer);
  clearTimeout(lockTimer);
  $('startBtn').textContent = '▶ Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  setStatus('Stopped');
}

// After silence, lock current streaming output and trigger revision
function resetLockTimer() {
  clearTimeout(lockTimer);
  lockTimer = setTimeout(function() {
    // Silence detected — lock whatever is streaming and revise
    if (currentStreamText.trim()) {
      var lockedEl = lockStreamingLine(currentStreamText);
      if (lockedEl && revisionWindow.length > 0) {
        // Add this final chunk to the revision window
        revisionWindow[revisionWindow.length - 1].en = currentStreamText.trim();
        if (!revisionLineEl) revisionLineEl = lockedEl;
      }
      currentStreamText = '';
    }
    if (revisionWindow.length >= 2) reviseLastChunks();
    else { revisionWindow = []; revisionLineEl = null; }
  }, LOCK_SILENCE_MS);
}

// =============================================
// STREAMING TRANSLATION
// =============================================
async function triggerTranslation(text, isRevision) {
  if (isTranslating) return;
  isTranslating = true;
  var koChunk = pending.trim();
  pending = '';
  currentStreamText = '';
  setStatus('Translating…', 'translating');
  clearError();

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Recent:\n' + historyLog.slice(-2).map(function(h){ return 'EN: ' + h.en; }).join('\n') + '\n\n'
    : '';

  if (streamAbortCtrl) streamAbortCtrl.abort();
  streamAbortCtrl = new AbortController();

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: streamAbortCtrl.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        stream: true,
        system: 'You are a live interpreter for a Christian worship service. Translate Korean into natural, reverent English. Korean often omits subjects — infer from context. Keep any English words as-is. Respond with ONLY the English translation, no quotes or explanation.',
        messages: [{ role: 'user', content: sermonLine + contextStr + 'Translate:\n' + text }]
      })
    });

    if (!res.ok) {
      var errData = await res.json();
      var msg = errData && errData.error && errData.error.message ? errData.error.message : 'HTTP ' + res.status;
      showError('API error: ' + msg);
      isTranslating = false;
      return;
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split('\n');
      buf = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line || line === 'event: ping') continue;
        if (line.startsWith('data: ')) {
          var rawData = line.slice(6);
          if (rawData === '[DONE]') continue;
          try {
            var parsed = JSON.parse(rawData);
            if (parsed.type === 'content_block_delta' && parsed.delta && parsed.delta.type === 'text_delta') {
              currentStreamText += parsed.delta.text;
              setStreamingText(currentStreamText);
            }
            if (parsed.type === 'message_stop') {
              // Quick translation done — add to revision window, DON'T lock yet
              // Locking happens after LOCK_SILENCE_MS of no new speech
              revisionWindow.push({ ko: koChunk, en: currentStreamText.trim() });
              var dbg = document.getElementById('debug-badge');
              if (dbg) dbg.textContent = 'window: ' + revisionWindow.length + ' chunks | lock in ' + (LOCK_SILENCE_MS/1000) + 's';
              if (revisionWindow.length === 1) {
                // First chunk: lock immediately to screen so user sees something
                var el = lockStreamingLine(currentStreamText);
                revisionLineEl = el;
              } else {
                // Subsequent chunks: show as new line, will be merged on revision
                var el2 = lockStreamingLine(currentStreamText);
                if (!revisionLineEl) revisionLineEl = el2;
              }
              currentStreamText = '';
              setStatus('🎤 Listening…', 'listening');
              isTranslating = false;
              if (pending.trim()) triggerTranslation(pending.trim(), false);
            }
          } catch(ex) {}
        }
      }
    }

    if (isTranslating && currentStreamText.trim()) {
      revisionWindow.push({ ko: koChunk, en: currentStreamText.trim() });
      var el3 = lockStreamingLine(currentStreamText);
      if (!revisionLineEl) revisionLineEl = el3;
      currentStreamText = '';
      setStatus('🎤 Listening…', 'listening');
      isTranslating = false;
      if (pending.trim()) triggerTranslation(pending.trim(), false);
    }

  } catch(err) {
    if (err.name === 'AbortError') { isTranslating = false; return; }
    showError('Network error: ' + err.message);
    isTranslating = false;
  }
}
</script>
</body>
</html>
