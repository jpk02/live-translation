<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #controls {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  input[type="text"] {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 6px;
    color: #f0f0f0;
    padding: 6px 10px;
    font-size: 13px;
    width: 260px;
  }
  button {
    border: none;
    border-radius: 6px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #aaaaaa; }
  #status.error { color: #e74c3c; }
  #error-box {
    display: none;
    background: #1a0000;
    border: 1px solid #500;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 6px 20px;
    font-family: monospace;
    word-break: break-all;
    flex-shrink: 0;
  }
  #display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 40px 60px;
    position: relative;
    overflow: hidden;
  }
  #placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #2a2a2a;
    pointer-events: none;
  }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }
  #translation-box { width: 100%; max-width: 1200px; text-align: center; }
  #translation-lines { display: flex; flex-direction: column; gap: 32px; margin-bottom: 12px; }
  .tline {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: color 0.5s, opacity 0.6s;
  }
  .tline.newest { color: #ffffff; }
  .tline.older  { color: #ffffff; }
  .tline.oldest { color: #666666; }
  #streaming-line {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    color: #ffffff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    min-height: 1.5em;
    transition: opacity 0.3s;
  }
  #streaming-line.empty { opacity: 0; }
  #streaming-cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: #ffffff;
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #interim-text {
    font-size: clamp(13px, 1.6vw, 20px);
    color: #444;
    margin-top: 18px;
    font-style: italic;
    min-height: 1.4em;
    font-family: sans-serif;
  }
  #debug-badge {
    position: fixed;
    bottom: 24px; left: 20px;
    font-size: 11px;
    font-family: monospace;
    color: #555;
    background: #111;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #222;
    pointer-events: none;
  }
  #mic-indicator {
    position: fixed;
    bottom: 24px; right: 28px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #333;
  }
  #mic-indicator.active {
    background: #2ecc71;
    box-shadow: 0 0 10px #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div id="controls">
  <label style="font-size:13px;color:#888;">Sermon topic:</label>
  <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
  <button id="startBtn" onclick="toggleListening()">▶ Start</button>
  <button id="clearBtn" onclick="clearTranslations()" style="background:#555;color:#ccc;">⌫ Clear</button>
  <span id="status">Ready</span>
  <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>
<div id="error-box"></div>

<div id="display">
  <div id="placeholder">
    <h1>CHIU YANG CHURCH</h1>
  </div>
  <div id="translation-box">
    <div id="translation-lines"></div>
    <div id="streaming-line" class="empty">
      <span id="streaming-text"></span><span id="streaming-cursor" style="display:none"></span>
    </div>
    <div id="interim-text"></div>
  </div>
</div>
<div id="mic-indicator"></div>
<div id="debug-badge">window: 0 chunks</div>

<script>
var WORKER_URL = 'https://live-translation.pauljkim22.workers.dev';
var firebaseConfig = {
  apiKey: "AIzaSyCqzFwELPmWwDWrbTILL1L-opT0xlKMOPs",
  authDomain: "live-translation-fd583.firebaseapp.com",
  databaseURL: "https://live-translation-fd583-default-rtdb.firebaseio.com",
  projectId: "live-translation-fd583",
  storageBucket: "live-translation-fd583.firebasestorage.app",
  messagingSenderId: "189364035896",
  appId: "1:189364035896:web:552700e29449859089a1cd"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var translationsRef = db.ref('translations');
var isOperator = window.location.search.includes('operator');

function $(id) { return document.getElementById(id); }

// =============================================
// VIEWER MODE
// Simple and bulletproof — seenKeys prevents
// any duplicate regardless of listener timing.
// Revision is purely a visual operator-side effect;
// viewers only ever receive final pushed lines.
// =============================================
if (!isOperator) {
  document.addEventListener('DOMContentLoaded', function() {
    $('controls').style.display = 'none';
    $('error-box').style.display = 'none';
    $('streaming-line').style.display = 'none';
    $('interim-text').style.display = 'none';
    $('debug-badge').style.display = 'none';

    var seenKeys = new Set();

    // Load last 10 on arrival, mark all as seen
    translationsRef.limitToLast(10).once('value', function(snap) {
      snap.forEach(function(child) {
        seenKeys.add(child.key);
        var it = child.val();
        if (it && it.text) displayFinalLine(it.text, null, true);
      });

      // Now attach child_added — seenKeys blocks history re-firing
      translationsRef.on('child_added', function(snap) {
        if (seenKeys.has(snap.key)) return;
        seenKeys.add(snap.key);
        var it = snap.val();
        if (it && it.text) displayFinalLine(it.text, null, true);
      });
    });

    // Watch for board clear
    translationsRef.on('value', function(snap) {
      if (!snap.val()) {
        $('translation-lines').innerHTML = '';
        $('placeholder').style.display = 'block';
        seenKeys.clear();
      }
    });
  });
}

// =============================================
// OPERATOR MODE STATE
// =============================================
var rec = null;
var isListening = false;
var translateTimer = null;
var lockTimer = null;
var rollingTimer = null;
var pending = '';
var isTranslating = false;
var historyLog = [];
var currentStreamText = '';
var streamAbortCtrl = null;
var revisionWindow = [];   // [{ko, en}]
var revisionLineEl = null;
var LOCK_SILENCE_MS = 4000;

// =============================================
// SHARED UI HELPERS
// =============================================
function showError(msg) { $('error-box').style.display='block'; $('error-box').textContent=msg; setStatus('Error','error'); }
function clearError() { $('error-box').style.display='none'; }
function setStatus(msg, cls) { $('status').textContent=msg; $('status').className=cls||''; }

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    $('controls').style.display = 'none';
  } else {
    document.exitFullscreen();
    $('controls').style.display = 'flex';
  }
}

function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  var total = all.length;
  all.forEach(function(el, i) {
    el.classList.remove('newest','older','oldest');
    var fromBottom = total - 1 - i;
    if (fromBottom === 0) el.classList.add('newest');
    else if (fromBottom === 1) el.classList.add('older');
    else el.classList.add('oldest');
  });
}

// displayFinalLine: adds a line to the DOM.
// reuseEl: if provided, updates that element in place (operator revision only).
// skipFirebase: true in viewer mode and for operator in-place revisions.
function displayFinalLine(text, reuseEl, skipFirebase) {
  $('placeholder').style.display = 'none';
  var linesEl = $('translation-lines');

  if (reuseEl && linesEl.contains(reuseEl)) {
    reuseEl.style.opacity = '0.4';
    setTimeout(function() { reuseEl.textContent = text; reuseEl.style.opacity = '1'; }, 180);
    return reuseEl;
  }

  var div = document.createElement('div');
  div.className = 'tline newest';
  div.textContent = text;
  div.style.opacity = '0';
  linesEl.appendChild(div);
  requestAnimationFrame(function() { requestAnimationFrame(function() { div.style.opacity = '1'; }); });
  reclassLines();
  requestAnimationFrame(function() {
    var maxH = $('display').clientHeight - 120;
    while (linesEl.scrollHeight > maxH && linesEl.children.length > 1) {
      linesEl.removeChild(linesEl.firstChild);
      reclassLines();
    }
  });

  if (!skipFirebase) {
    translationsRef.push({ text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
  }
  return div;
}

function setStreamingText(text) {
  var el = $('streaming-line'), t = $('streaming-text'), cur = $('streaming-cursor');
  if (!text) {
    el.classList.add('empty'); t.textContent = ''; cur.style.display = 'none';
  } else {
    $('placeholder').style.display = 'none';
    el.classList.remove('empty'); t.textContent = text; cur.style.display = 'inline-block';
  }
}

function lockStreamingLine(text) {
  setStreamingText('');
  if (!text || !text.trim()) return null;
  return displayFinalLine(text.trim());
}

function clearTranslations() {
  translationsRef.remove();
  $('translation-lines').innerHTML = '';
  setStreamingText('');
  revisionWindow = [];
  revisionLineEl = null;
  $('placeholder').style.display = 'block';
}

// =============================================
// REVISION
// Operator-side only. Merges partial chunks into
// one clean sentence. Only pushes ONE entry to
// Firebase (the revised final), never deletes.
// Viewers only ever see this one clean push.
// =============================================
async function reviseLastChunks() {
  if (revisionWindow.length < 2) { revisionWindow = []; revisionLineEl = null; return; }

  var koText  = revisionWindow.map(function(c) { return c.ko; }).join(' ');
  var enDraft = revisionWindow.map(function(c) { return c.en; }).join(' ');
  var targetEl = revisionLineEl;

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Prior sentences:\n' + historyLog.slice(-2).map(function(h) { return h.en; }).join('\n') + '\n\n'
    : '';

  revisionWindow = [];
  revisionLineEl = null;

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        stream: false,
        system: 'You are a live interpreter for a Christian worship service. You are given Korean text spoken with pauses and a rough draft English translation. Produce ONE clean, natural, complete English sentence capturing the full meaning. Korean verbs come last — meaning often only becomes clear at the end. Speech recognition may mishear words — use context to infer correctly. Respond with ONLY the final English sentence, nothing else.',
        messages: [{
          role: 'user',
          content: sermonLine + contextStr +
            'Korean: ' + koText + '\n' +
            'Draft: ' + enDraft + '\n\n' +
            'Final translation:'
        }]
      })
    });

    if (!res.ok) return;
    var data = await res.json();
    var revised = data && data.content && data.content[0] ? data.content[0].text.trim() : null;
    if (!revised) return;

    // 1. Update operator DOM: collapse partial lines into one revised line
    var linesEl = $('translation-lines');
    if (targetEl && linesEl.contains(targetEl)) {
      var allLines = Array.prototype.slice.call(linesEl.querySelectorAll('.tline'));
      var targetIdx = allLines.indexOf(targetEl);
      // Remove any lines after the first chunk's line (the partial ones)
      for (var i = allLines.length - 1; i > targetIdx; i--) {
        linesEl.removeChild(allLines[i]);
      }
      reclassLines();
      displayFinalLine(revised, targetEl, true); // update in place, no Firebase
    }

    // 2. Push ONE clean revised line to Firebase for viewers
    // (partial chunk lines were never pushed to Firebase — see triggerTranslation)
    translationsRef.push({ text: revised, timestamp: firebase.database.ServerValue.TIMESTAMP });

    historyLog.push({ en: revised });
    if (historyLog.length > 6) historyLog.shift();

  } catch(e) { /* silently keep whatever is displayed */ }
}

// =============================================
// SPEECH RECOGNITION
// =============================================
function toggleListening() { if (isListening) stopListening(); else startListening(); }

function startListening() {
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Please use Google Chrome.'); return; }
  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = function() {
    isListening = true;
    $('startBtn').textContent = '■ Stop';
    $('startBtn').classList.add('active');
    $('mic-indicator').classList.add('active');
    setStatus('🎤 Listening…', 'listening');

    // Hard fallback: every 5 seconds, force a translation of whatever we have
    rollingTimer = setInterval(function() {
      var interimEl = $('interim-text');
      var interimText = interimEl ? interimEl.textContent.replace(/^"|"$/g, '').trim() : '';
      var text = pending.trim() || interimText;
      var dbg = $('debug-badge');
    if (dbg) { dbg.style.display = 'block'; dbg.textContent = 'timer fired | pending:"' + pending.trim() + '" interim:"' + interimText.slice(0,20) + '" translating:' + isTranslating; }
      if (text && !isTranslating) {
        pending = '';
        triggerTranslation(text);
      }
    }, 3000);
  };

  rec.onresult = function(e) {
    var interim = '', final = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }

    if (interim) {
      $('interim-text').textContent = '"' + interim + '"';
      // If interim is long enough and nothing is translating, fire early
      var combinedLen = (pending + ' ' + interim).trim().length;
      if (combinedLen > 30 && !isTranslating) {
        clearTimeout(translateTimer);
        translateTimer = setTimeout(function() {
          var text = (pending + ' ' + interim).trim();
          if (text && !isTranslating) {
            pending = '';
            triggerTranslation(text);
          }
        }, 800);
      }
    }

    if (final) {
      $('interim-text').textContent = '';
      pending += ' ' + final.trim();
      clearTimeout(translateTimer);
      translateTimer = setTimeout(function() {
        if (pending.trim() && !isTranslating) triggerTranslation(pending.trim());
      }, 350);
      resetLockTimer();
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed') { showError('Microphone access denied.'); stopListening(); }
  };

  rec.onend = function() {
    if (isListening) setTimeout(function() { try { rec.start(); } catch(ex) {} }, 200);
  };

  rec.start();
}

function stopListening() {
  isListening = false;
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  if (rollingTimer) { clearInterval(rollingTimer); rollingTimer = null; }
  clearTimeout(translateTimer);
  clearTimeout(lockTimer);
  $('startBtn').textContent = '▶ Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  setStatus('Stopped');
}

function resetLockTimer() {
  clearTimeout(lockTimer);
  lockTimer = setTimeout(function() {
    if (currentStreamText.trim()) {
      var lockedEl = lockStreamingLine(currentStreamText);
      if (revisionWindow.length > 0) {
        revisionWindow[revisionWindow.length - 1].en = currentStreamText.trim();
        if (!revisionLineEl) revisionLineEl = lockedEl;
      }
      currentStreamText = '';
    }
    if (revisionWindow.length >= 2) reviseLastChunks();
    else { revisionWindow = []; revisionLineEl = null; }
  }, LOCK_SILENCE_MS);
}

// =============================================
// STREAMING TRANSLATION
// KEY DESIGN: partial chunks are shown on the
// operator screen but NOT pushed to Firebase.
// Only the final revised sentence gets pushed.
// This is what keeps the viewer clean.
// =============================================
function deStutter(text) {
  var tokens = text.trim().split(/\s+/), out = [];
  for (var i = 0; i < tokens.length; i++) {
    if (i === 0 || tokens[i] !== tokens[i-1]) out.push(tokens[i]);
  }
  return out.join(' ');
}

async function triggerTranslation(text) {
  if (isTranslating) return;
  isTranslating = true;
  var koChunk = deStutter(pending.trim());
  pending = '';
  currentStreamText = '';
  setStatus('Translating…', 'translating');
  clearError();

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Recent:\n' + historyLog.slice(-2).map(function(h) { return 'EN: ' + h.en; }).join('\n') + '\n\n'
    : '';

  if (streamAbortCtrl) streamAbortCtrl.abort();
  streamAbortCtrl = new AbortController();

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: streamAbortCtrl.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        stream: true,
        system: 'You are a live interpreter for a Christian worship service. Translate Korean into natural, reverent English. Korean often omits subjects — infer from context. Keep any English words as-is. The speaker may stutter or restart phrases — translate only the intended meaning. Respond with ONLY the English translation, no quotes or explanation.',
        messages: [{ role: 'user', content: sermonLine + contextStr + 'Translate:\n' + text }]
      })
    });

    if (!res.ok) {
      var errData = await res.json();
      showError('API error: ' + (errData && errData.error ? errData.error.message : 'HTTP ' + res.status));
      isTranslating = false;
      return;
    }

    var reader = res.body.getReader(), decoder = new TextDecoder(), buf = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split('\n');
      buf = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line || line === 'event: ping') continue;
        if (!line.startsWith('data: ')) continue;
        var rawData = line.slice(6);
        if (rawData === '[DONE]') continue;
        try {
          var parsed = JSON.parse(rawData);
          if (parsed.type === 'content_block_delta' && parsed.delta && parsed.delta.type === 'text_delta') {
            currentStreamText += parsed.delta.text;
            setStreamingText(currentStreamText);
          }
          if (parsed.type === 'message_stop') {
            var chunkText = currentStreamText.trim();
            currentStreamText = '';

            // Add to revision window
            revisionWindow.push({ ko: koChunk, en: chunkText });
            var dbg = $('debug-badge');
            if (dbg) dbg.textContent = 'window: ' + revisionWindow.length + ' chunks | lock in ' + (LOCK_SILENCE_MS/1000) + 's';

            // Show on operator screen immediately (skipFirebase=true — viewer gets
            // the clean revised version later, not these partials)
            var lineEl = lockStreamingLine(chunkText);
            if (!revisionLineEl) revisionLineEl = lineEl;

            setStatus('🎤 Listening…', 'listening');
            isTranslating = false;
            if (pending.trim()) triggerTranslation(pending.trim());
          }
        } catch(ex) {}
      }
    }

    // Fallback if stream ends without message_stop
    if (isTranslating && currentStreamText.trim()) {
      var chunkText2 = currentStreamText.trim();
      currentStreamText = '';
      revisionWindow.push({ ko: koChunk, en: chunkText2 });
      var lineEl2 = lockStreamingLine(chunkText2);
      if (!revisionLineEl) revisionLineEl = lineEl2;
      setStatus('🎤 Listening…', 'listening');
      isTranslating = false;
      if (pending.trim()) triggerTranslation(pending.trim());
    }

  } catch(err) {
    if (err.name === 'AbortError') { isTranslating = false; return; }
    showError('Network error: ' + err.message);
    isTranslating = false;
  }
}
</script>
</body>
</html>
