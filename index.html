<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translation</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #controls {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  input[type="text"] {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 6px;
    color: #f0f0f0;
    padding: 6px 10px;
    font-size: 13px;
    width: 260px;
  }
  button {
    border: none;
    border-radius: 6px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #startBtn { background: #2ecc71; color: #000; }
  #startBtn.active { background: #e74c3c; color: #fff; }
  #fullscreenBtn { background: #333; color: #ccc; margin-left: auto; }
  #status { font-size: 12px; color: #666; min-width: 160px; }
  #status.listening { color: #2ecc71; }
  #status.translating { color: #f39c12; }
  #status.error { color: #e74c3c; }
  #error-box {
    display: none;
    background: #1a0000;
    border: 1px solid #500;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 6px 20px;
    font-family: monospace;
    word-break: break-all;
    flex-shrink: 0;
  }
  #display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 40px 60px;
    position: relative;
    overflow: hidden;
  }
  #placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #2a2a2a;
    pointer-events: none;
  }
  #placeholder h1 { font-size: 48px; font-weight: 300; letter-spacing: 4px; }
  #translation-box { width: 100%; max-width: 1200px; text-align: center; }
  #translation-lines { display: flex; flex-direction: column; gap: 32px; margin-bottom: 12px; }
  .tline {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    transition: color 0.5s, opacity 0.6s;
  }
  .tline.newest { color: #ffffff; }
  .tline.older  { color: #777777; }
  .tline.oldest { color: #3a3a3a; }
  #streaming-line {
    font-size: clamp(24px, 4vw, 60px);
    line-height: 1.5;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    color: #f0c040;
    min-height: 1.5em;
    transition: opacity 0.3s;
  }
  #streaming-line.empty { opacity: 0; }
  #streaming-cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: #f0c040;
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #interim-text {
    font-size: clamp(13px, 1.6vw, 20px);
    color: #444;
    margin-top: 18px;
    font-style: italic;
    min-height: 1.4em;
    font-family: sans-serif;
  }
  #mic-indicator {
    position: fixed;
    bottom: 24px; right: 28px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #333;
  }
  #mic-indicator.active {
    background: #2ecc71;
    box-shadow: 0 0 10px #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div id="controls">
  <label style="font-size:13px;color:#888;">Sermon topic:</label>
  <input type="text" id="sermonContext" placeholder="e.g. John 3:16, faith, grace" />
  <button id="startBtn" onclick="toggleListening()">▶ Start</button>
  <button id="clearBtn" onclick="clearTranslations()" style="background:#555;color:#ccc;">⌫ Clear</button>
  <span id="status">Ready</span>
  <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>
<div id="error-box"></div>

<div id="display">
  <div id="placeholder">
    <h1>CHIU YANG CHURCH</h1>
  </div>
  <div id="translation-box">
    <div id="translation-lines"></div>
    <div id="streaming-line" class="empty"><span id="streaming-text"></span><span id="streaming-cursor" style="display:none"></span></div>
    <div id="interim-text"></div>
  </div>
</div>
<div id="mic-indicator"></div>

<script>
var WORKER_URL = 'https://live-translation.pauljkim22.workers.dev';
var firebaseConfig = {
  apiKey: "AIzaSyCqzFwELPmWwDWrbTILL1L-opT0xlKMOPs",
  authDomain: "live-translation-fd583.firebaseapp.com",
  databaseURL: "https://live-translation-fd583-default-rtdb.firebaseio.com",
  projectId: "live-translation-fd583",
  storageBucket: "live-translation-fd583.firebasestorage.app",
  messagingSenderId: "189364035896",
  appId: "1:189364035896:web:552700e29449859089a1cd"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var translationsRef = db.ref('translations');
var isOperator = window.location.search.includes('operator');

var rec = null;
var isListening = false;
var translateTimer = null;
var rollingTimer = null;
var pending = '';
var isTranslating = false;
var historyLog = [];
var currentStreamText = '';
var streamAbortCtrl = null;

function $(id) { return document.getElementById(id); }

if (!isOperator) {
  document.addEventListener('DOMContentLoaded', function() {
    $('controls').style.display = 'none';
    $('error-box').style.display = 'none';
    $('streaming-line').style.display = 'none';
    $('interim-text').style.display = 'none';

    var childListener = null;
    function startListeningForTranslations() {
      if (childListener) { translationsRef.off('child_added', childListener); childListener = null; }
      translationsRef.limitToLast(10).once('value', function(snap) {
        var data = snap.val(), lastKey = null;
        if (data) {
          lastKey = Object.keys(data).pop();
          Object.values(data).forEach(function(item) { if (item && item.text) displayFinalLine(item.text); });
        }
        childListener = function(s) { var it = s.val(); if (it && it.text) displayFinalLine(it.text); };
        translationsRef.orderByKey().startAfter(lastKey || '0').on('child_added', childListener);
      });
    }
    startListeningForTranslations();
    translationsRef.on('value', function(snap) {
      if (!snap.val()) {
        $('translation-lines').innerHTML = '';
        $('placeholder').style.display = 'block';
        startListeningForTranslations();
      }
    });
  });
}

function showError(msg) { $('error-box').style.display = 'block'; $('error-box').textContent = msg; setStatus('Error', 'error'); }
function clearError() { $('error-box').style.display = 'none'; }
function setStatus(msg, cls) { $('status').textContent = msg; $('status').className = cls || ''; }

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    $('controls').style.display = 'none';
  } else {
    document.exitFullscreen();
    $('controls').style.display = 'flex';
  }
}

function reclassLines() {
  var all = $('translation-lines').querySelectorAll('.tline');
  all.forEach(function(el, i) {
    el.classList.remove('newest', 'older', 'oldest');
    var fromBottom = all.length - 1 - i;
    if (fromBottom === 0) el.classList.add('newest');
    else if (fromBottom === 1) el.classList.add('older');
    else el.classList.add('oldest');
  });
}

function displayFinalLine(text) {
  $('placeholder').style.display = 'none';
  var linesEl = $('translation-lines');
  var div = document.createElement('div');
  div.className = 'tline newest';
  div.textContent = text;
  div.style.opacity = '0';
  linesEl.appendChild(div);
  requestAnimationFrame(function() { requestAnimationFrame(function() { div.style.opacity = '1'; }); });
  reclassLines();
  requestAnimationFrame(function() {
    var maxH = $('display').clientHeight - 120;
    while (linesEl.scrollHeight > maxH && linesEl.children.length > 1) {
      linesEl.removeChild(linesEl.firstChild);
      reclassLines();
    }
  });
}

function setStreamingText(text) {
  var el = $('streaming-line');
  var t = $('streaming-text');
  var cur = $('streaming-cursor');
  if (!text) {
    el.classList.add('empty');
    t.textContent = '';
    cur.style.display = 'none';
  } else {
    $('placeholder').style.display = 'none';
    el.classList.remove('empty');
    t.textContent = text;
    cur.style.display = 'inline-block';
  }
}

function lockStreamingLine(text) {
  setStreamingText('');
  if (text && text.trim()) {
    translationsRef.push({ text: text.trim(), timestamp: firebase.database.ServerValue.TIMESTAMP });
    displayFinalLine(text.trim());
    historyLog.push({ en: text.trim() });
    if (historyLog.length > 6) historyLog.shift();
  }
}

function clearTranslations() {
  translationsRef.remove();
  $('translation-lines').innerHTML = '';
  setStreamingText('');
  $('placeholder').style.display = 'block';
}

function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  clearError();
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Please use Google Chrome.'); return; }

  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = function() {
    isListening = true;
    $('startBtn').textContent = '■ Stop';
    $('startBtn').classList.add('active');
    $('mic-indicator').classList.add('active');
    setStatus('🎤 Listening…', 'listening');
    rollingTimer = setInterval(function() {
      if (pending.trim() && !isTranslating) translateStreamingText(pending.trim());
    }, 2500);
  };

  rec.onresult = function(e) {
    var interim = '', final = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) $('interim-text').textContent = '"' + interim + '"';
    if (final) {
      $('interim-text').textContent = '';
      pending += ' ' + final.trim();
      clearTimeout(translateTimer);
      translateTimer = setTimeout(function() {
        if (pending.trim() && !isTranslating) translateStreamingText(pending.trim());
      }, 400);
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed') { showError('Microphone access denied.'); stopListening(); }
  };

  rec.onend = function() {
    if (isListening) setTimeout(function() {
      if (isListening) { try { rec.start(); } catch(ex) {} }
    }, 200);
  };

  rec.start();
}

function stopListening() {
  isListening = false;
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  if (rollingTimer) { clearInterval(rollingTimer); rollingTimer = null; }
  clearTimeout(translateTimer);
  $('startBtn').textContent = '▶ Start';
  $('startBtn').classList.remove('active');
  $('mic-indicator').classList.remove('active');
  $('interim-text').textContent = '';
  setStatus('Stopped');
}

async function translateStreamingText(text, retryCount) {
  retryCount = retryCount || 0;
  if (isTranslating) return;
  isTranslating = true;
  pending = '';
  currentStreamText = '';
  setStatus('Translating…', 'translating');
  clearError();

  var sermonContext = $('sermonContext').value.trim();
  var sermonLine = sermonContext ? 'Sermon topic: ' + sermonContext + '\n\n' : '';
  var contextStr = historyLog.length
    ? 'Recent:\n' + historyLog.slice(-3).map(function(h) { return 'EN: ' + h.en; }).join('\n') + '\n\n'
    : '';

  if (streamAbortCtrl) streamAbortCtrl.abort();
  streamAbortCtrl = new AbortController();

  try {
    var res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: streamAbortCtrl.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        stream: true,
        system: 'You are a live interpreter for a Christian worship service. Translate Korean into natural, reverent English. Korean often omits subjects — infer from context. Keep any English words as-is. Respond with ONLY the English translation, no quotes or explanation.',
        messages: [{ role: 'user', content: sermonLine + contextStr + 'Translate:\n' + text }]
      })
    });

    if (!res.ok) {
      var err = await res.json();
      var msg = err && err.error && err.error.message ? err.error.message : 'HTTP ' + res.status;
      if ((res.status === 529 || msg.toLowerCase().includes('overload')) && retryCount < 3) {
        setStatus('Server busy, retrying…', 'translating');
        isTranslating = false;
        setTimeout(function() { translateStreamingText(text, retryCount + 1); }, 2000 * (retryCount + 1));
        return;
      }
      showError('API error: ' + msg);
      isTranslating = false;
      return;
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });

      var lines = buf.split('\n');
      buf = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line || line === 'event: ping') continue;
        if (line.startsWith('data: ')) {
          var data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            var parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta && parsed.delta.type === 'text_delta') {
              currentStreamText += parsed.delta.text;
              setStreamingText(currentStreamText);
            }
            if (parsed.type === 'message_stop') {
              lockStreamingLine(currentStreamText);
              setStatus('🎤 Listening…', 'listening');
              isTranslating = false;
              if (pending.trim()) translateStreamingText(pending.trim());
            }
          } catch(e) {}
        }
      }
    }

    if (isTranslating && currentStreamText.trim()) {
      lockStreamingLine(currentStreamText);
      setStatus('🎤 Listening…', 'listening');
      isTranslating = false;
      if (pending.trim()) translateStreamingText(pending.trim());
    }

  } catch(err) {
    if (err.name === 'AbortError') { isTranslating = false; return; }
    showError('Network error: ' + err.message);
    isTranslating = false;
  }
}
</script>
</body>
</html>
